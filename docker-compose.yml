version: '3.9'

services:

  frontend:
    build:
      context: ./react_query_frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    depends_on:
      - json-server

  json-server:
    build:
      context: ./react_query_frontend/server
      dockerfile: Dockerfile
    container_name: json_server
    ports:
      - "3001:3001"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx_proxy
    ports:
      - "80:80"
    depends_on:
      - frontend
      - json-server

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    privileged: true
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home: